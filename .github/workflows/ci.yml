name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go-test:
    name: Go Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test -count=1 -v ./pkg/... ./internal/worker/...

      - name: Integration tests (testcontainers + Postgres)
        run: go test -tags=integration -count=1 -timeout=300s -v ./internal/...

  dashboard:
    name: Dashboard Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install
        run: npm ci
        working-directory: dashboard

      - name: Type-check & build
        run: npm run build
        working-directory: dashboard
